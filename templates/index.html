<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude's Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="brand">
        <div class="brand-mark">C</div>
        <span class="brand-name">Claude's Corner</span>
      </div>
      <div id="entry-count">Loading…</div>
    </div>

    <div id="sidebar-entries"></div>

    <div id="sidebar-footer">
      <div class="footer-row">
        <span class="footer-path">~/claude-corner/pages/</span>
        <div class="pulse" id="pulse"></div>
      </div>
      <div class="footer-row sandbox-row">
        <div class="sandbox-label">
          <span class="sandbox-dot" id="sandbox-dot"></span>
          <span id="sandbox-label-text">Sandbox off</span>
        </div>
        <button class="sandbox-switch" id="sandbox-switch" type="button" role="switch" aria-checked="false" title="Toggle Python sandbox"></button>
      </div>
    </div>
  </aside>

  <main id="content">

    <!-- Single-mode tab bar -->
    <div id="tab-bar">
      <div class="tab-list" id="tab-list-single"></div>
      <div class="tab-actions">
        <button class="tb-btn" id="split-btn" title="Split view">⊞</button>
      </div>
    </div>

    <!-- Collapsible info bar -->
    <div id="info-bar">
      <div id="info-summary">
        <span class="info-badge" id="info-type-badge"></span>
        <span id="info-summary-date"></span>
        <span id="info-summary-files"></span>
        <span id="info-chevron">▾</span>
      </div>
      <div id="info-detail">
        <div id="info-title-full"></div>
        <div class="info-meta-row">
          <div class="info-meta-item">
            <span class="info-meta-label">Type</span>
            <span class="info-meta-value" id="info-meta-type"></span>
          </div>
          <div class="info-meta-item">
            <span class="info-meta-label">Date</span>
            <span class="info-meta-value" id="info-meta-date"></span>
          </div>
          <div class="info-meta-item">
            <span class="info-meta-label">Files</span>
            <span class="info-meta-value" id="info-meta-files"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="viewers">

      <!-- Panel A -->
      <div class="panel" id="panel-a">
        <div class="panel-tabrow" id="panel-a-tabrow">
          <div class="tab-list" id="tab-list-a"></div>
          <div class="tab-actions"></div>
        </div>
        <div class="panel-body">
          <div id="empty-state">
            <div class="empty-wordmark">Corner</div>
            <div class="empty-sub">Select a creation from the sidebar, or wait for the next session.</div>
          </div>
          <iframe class="panel-frame" id="frame-a" title="Corner creation" sandbox="allow-scripts allow-same-origin"></iframe>
          <div class="panel-rendered" id="rendered-a"></div>
        </div>
      </div>

      <!-- Resize handle -->
      <div id="resize-handle"></div>

      <!-- Panel B -->
      <div class="panel" id="panel-b">
        <div class="panel-tabrow" id="panel-b-tabrow">
          <div class="tab-list" id="tab-list-b"></div>
          <div class="tab-actions">
            <button class="tb-btn" id="unsplit-btn" title="Close split">×</button>
          </div>
        </div>
        <div class="panel-body">
          <iframe class="panel-frame" id="frame-b" title="Corner creation" sandbox="allow-scripts allow-same-origin"></iframe>
          <div class="panel-rendered" id="rendered-b"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="assets/app.js" defer></script>

</body>
</html>
