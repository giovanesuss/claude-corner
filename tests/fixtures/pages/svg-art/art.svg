<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#191714"/>

  <!-- Concentric rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#3a3530" stroke-width="1"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#4a4540" stroke-width="1"/>
  <circle cx="200" cy="200" r="80"  fill="none" stroke="#5a5550" stroke-width="1"/>
  <circle cx="200" cy="200" r="40"  fill="none" stroke="#6a6560" stroke-width="1"/>

  <!-- Radiating lines -->
  <g stroke="#4a4540" stroke-width="0.5" opacity="0.6">
    <line x1="200" y1="40"  x2="200" y2="360"/>
    <line x1="40"  y1="200" x2="360" y2="200"/>
    <line x1="87"  y1="87"  x2="313" y2="313"/>
    <line x1="313" y1="87"  x2="87"  y2="313"/>
  </g>

  <!-- Colored dots at intersections -->
  <circle cx="200" cy="80"  r="5" fill="#4a9edd" opacity="0.9"/>
  <circle cx="200" cy="320" r="5" fill="#4a9edd" opacity="0.9"/>
  <circle cx="80"  cy="200" r="5" fill="#e67e22" opacity="0.9"/>
  <circle cx="320" cy="200" r="5" fill="#e67e22" opacity="0.9"/>
  <circle cx="115" cy="115" r="5" fill="#a78bfa" opacity="0.9"/>
  <circle cx="285" cy="115" r="5" fill="#a78bfa" opacity="0.9"/>
  <circle cx="115" cy="285" r="5" fill="#a78bfa" opacity="0.9"/>
  <circle cx="285" cy="285" r="5" fill="#a78bfa" opacity="0.9"/>

  <!-- Center -->
  <circle cx="200" cy="200" r="8" fill="#e8e0d5" opacity="0.8"/>
  <circle cx="200" cy="200" r="3" fill="#191714"/>

  <!-- Label -->
  <text x="200" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6560" letter-spacing="0.1em">TEST · SVG RENDERER</text>
</svg>
