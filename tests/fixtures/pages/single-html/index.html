<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #191714;
    color: #e8e0d5;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .badge { color: #4a9edd; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
  h1 { font-size: 2.5rem; font-weight: normal; margin-bottom: 1rem; }
  p { color: #9e9590; max-width: 480px; line-height: 1.7; }
  .check { margin-top: 2rem; display: inline-block; background: #2a2520; border: 1px solid #3a3530; border-radius: 8px; padding: 1rem 2rem; font-size: 0.85rem; color: #4ade80; }
</style>
</head>
<body>
  <div>
    <div class="badge">TEST · single-html</div>
    <h1>Single HTML Page</h1>
    <p>This entry has one file and no tabs. The tab bar should be hidden and the split button should not appear.</p>
    <div class="check">✓ iframe render · ✓ no tabs · ✓ no split button</div>
  </div>
</body>
</html>
